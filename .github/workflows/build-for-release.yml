name: Tag and Publish Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Builds a docker image for a new version and opens a PR to update action.yml to reference the new image. The version should be in the format of a semver version (e.g. 1.2.3 or v1.2.3). After merging the PR, tag the release at the same version"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  tag-and-publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Validate version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="v${VERSION#v}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be a semantic version (e.g. 1.2.3 or v1.2.3), got: ${{ inputs.version }}"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Create and push git tag
        run: |
          git tag "image-${{ steps.version.outputs.value }}"
          git push origin "image-${{ steps.version.outputs.value }}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/jmhodges/dependabot-pr-merge-cleanup:${{ steps.version.outputs.value }}

  open-pr:
    runs-on: ubuntu-latest
    needs: tag-and-publish
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update action.yml image reference
        run: |
          sed -i "s|image: .*|image: 'docker://ghcr.io/jmhodges/dependabot-pr-merge-cleanup:${{ needs.tag-and-publish.outputs.version }}'|" action.yml

      - name: Create PR
        id: create-pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          title: "update action.yml image to ${{ needs.tag-and-publish.outputs.version }}"
          body: "Updates action.yml to reference image `ghcr.io/jmhodges/dependabot-pr-merge-cleanup:${{ needs.tag-and-publish.outputs.version }}`, built from tag `image-${{ needs.tag-and-publish.outputs.version }}`."
          branch: update-image-${{ needs.tag-and-publish.outputs.version }}
          commit-message: "update action.yml to image ${{ needs.tag-and-publish.outputs.version }}"
          token: ${{ secrets.CREATE_PULL_REQUEST_TOKEN }}

      - name: Comment release next steps on PR
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.CREATE_PULL_REQUEST_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
          VERSION: ${{ needs.tag-and-publish.outputs.version }}
        run: |
          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          ## Next steps to finish releasing \`$VERSION\`

          1. Review and merge this PR.
          2. Create a GitHub Release pointing at a new \`$VERSION\` tag.

          The Docker image is already published at \`ghcr.io/jmhodges/dependabot-pr-merge-cleanup:$VERSION\` and the image build is tagged \`image-$VERSION\`.
          EOF
          )"
