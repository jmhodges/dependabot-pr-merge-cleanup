name: Tag and Publish Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Builds a docker image for a new version and opens a PR to update action.yml to reference the new image. The version should be in the format of a semver version (e.g. 1.2.3). After merging the PR, tag the release at the same version"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  tag-and-publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Validate version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="v${VERSION#v}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be a semantic version (e.g. 1.2.3 or v1.2.3), got: ${{ inputs.version }}"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and push git tag
        run: |
          git tag "image-${{ steps.version.outputs.value }}"
          git push origin "image-${{ steps.version.outputs.value }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/jmhodges/dependabot-pr-merge-cleanup:${{ steps.version.outputs.value }}

  open-pr:
    runs-on: ubuntu-latest
    needs: tag-and-publish
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update action.yml image reference
        run: |
          sed -i "s|image: .*|image: 'docker://ghcr.io/jmhodges/dependabot-pr-merge-cleanup:${{ needs.tag-and-publish.outputs.version }}'|" action.yml

      - name: Create PR
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          title: "Update image to ${{ needs.tag-and-publish.outputs.version }}"
          body: "Updates action.yml to reference image `ghcr.io/jmhodges/dependabot-pr-merge-cleanup:${{ needs.tag-and-publish.outputs.version }}`, built from tag `image-${{ needs.tag-and-publish.outputs.version }}`."
          branch: update-image-${{ needs.tag-and-publish.outputs.version }}
          commit-message: "Update action.yml to use image ${{ needs.tag-and-publish.outputs.version }}"
